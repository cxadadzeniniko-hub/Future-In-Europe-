<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact Us | Future In Europe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <meta name="description" content="Contact Future In Europe for information about studying abroad.">

    <meta property="og:title" content="Future In Europe">
    <meta property="og:description" content="Study opportunities and top universities in Europe">
    <meta property="og:image" content="./images/students-europe.webp">
    <meta property="og:url" content="#">

    <link rel="icon" href="./images/favicon.png">

    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

<header class="header">

    <a href="index.html" class="logo">FIE</a>

    <button class="burger" aria-label="Toggle menu" aria-expanded="false">
        <span class="burger_line"></span>
        <span class="burger_line"></span>
        <span class="burger_line"></span>
    </button>

    <nav class="nav" id="nav">
        <ul class="nav_list">
            <li><a href="index.html" class="nav_link">Home</a></li>
            <li><a href="about.html" class="nav_link">Universities</a></li>
            <li><a href="contact.html" class="nav_link">Contact</a></li>
        </ul>
    </nav>

</header>

<main>

<section class="contact_section">

    <h1 class="contact_title">Contact Us</h1>

    <div class="contact_container">

        <form class="contact_form">

            <input type="text" placeholder="Your Name">

            <input type="email" placeholder="Your Email">

            <input type="tel" placeholder="Phone Number">

            <select>
                <option>Select Country</option>
                <option>Germany</option>
                <option>Italy</option>
                <option>Switzerland</option>
            </select>

            <textarea placeholder="What do you need?"></textarea>

            <label>
                <input type="checkbox">
                I am interested in studying in Europe
            </label>

            <label>
                <input type="checkbox">
                I would like to receive university updates
            </label>

            <button type="submit">
                Send Message
            </button>

        </form>

        <aside class="contact_info">

            <h2>Quick Information</h2>

            <p>futureineurope@gmail.com</p>

            <p>+995 555 55 55 55</p>



        </aside>

    </div>

</section>

</main>

<footer class="footer">
    2026 Future In Europe
</footer>

<script src="./main.js"></script>

</body>
</html>
